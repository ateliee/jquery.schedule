name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  create-tag:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      version-changed: ${{ steps.check-version.outputs.changed }}
      tag-created: ${{ steps.create-tag.outputs.tag-created }}
    
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #7.0.0
      with:
        fetch-depth: 0
    
    - name: Get package version
      id: get-version
      run: |
        VERSION=$(node -p "require('./package.json').version")
        echo "version=v$VERSION" >> $GITHUB_OUTPUT
        echo "Package version: v$VERSION"
    
    - name: Check if version changed
      id: check-version
      run: |
        CURRENT=$(node -p "require('./package.json').version")
        if ! git rev-parse HEAD^ >/dev/null 2>&1; then
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "No parent commit; proceeding with release"
          exit 0
        fi
        PREVIOUS=$(git show HEAD^:package.json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version")
        if [ "$CURRENT" = "$PREVIOUS" ]; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "Version unchanged ($CURRENT); skipping release"
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "Version changed: $PREVIOUS -> $CURRENT"
        fi
    
    - name: Check if tag exists
      if: steps.check-version.outputs.changed == 'true'
      id: check-tag
      run: |
        if git tag -l "${{ steps.get-version.outputs.version }}" | grep -q "${{ steps.get-version.outputs.version }}"; then
          echo "tag-exists=true" >> $GITHUB_OUTPUT
          echo "tag-created=false" >> $GITHUB_OUTPUT
          echo "Tag ${{ steps.get-version.outputs.version }} already exists"
        else
          echo "tag-exists=false" >> $GITHUB_OUTPUT
          echo "Tag ${{ steps.get-version.outputs.version }} does not exist"
        fi
    
    - name: Create and push tag
      id: create-tag
      if: steps.check-version.outputs.changed == 'true' && steps.check-tag.outputs.tag-exists == 'false'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "${{ steps.get-version.outputs.version }}" -m "Release ${{ steps.get-version.outputs.version }}"
        git push origin "${{ steps.get-version.outputs.version }}"
        echo "tag-created=true" >> $GITHUB_OUTPUT
        echo "Created and pushed tag: ${{ steps.get-version.outputs.version }}"

  github-release:
    runs-on: ubuntu-latest
    needs: create-tag
    if: needs.create-tag.outputs.version-changed == 'true' && needs.create-tag.outputs.tag-created == 'true'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #7.0.0
      with:
        fetch-depth: 0

    - name: Create GitHub Release with auto-generated notes
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "${{ needs.create-tag.outputs.version }}" \
          --generate-notes \
          --title "${{ needs.create-tag.outputs.version }}"

  github-package-release:
    runs-on: ubuntu-latest
    needs: create-tag
    if: needs.create-tag.outputs.version-changed == 'true' && needs.create-tag.outputs.tag-created == 'true'
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #7.0.0
    
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #6.4.0
      with:
        node-version: '24'
        cache: 'npm'
        registry-url: 'https://npm.pkg.github.com'
        scope: '@ateliee'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: |
        echo "Deploying to github ..."
        npm run build
    
    - name: Publish to GitHub Package Registry
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-package-release:
    runs-on: ubuntu-latest
    needs: create-tag
    if: needs.create-tag.outputs.version-changed == 'true' && needs.create-tag.outputs.tag-created == 'true'
    permissions:
      contents: read
      id-token: write # for OIDC
    
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #7.0.0
    
    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #6.4.0
      with:
        node-version: '24'
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: |
        echo "Deploying to npm ..."
        npm run build
    
    - name: Publish to NPM Registry
      run: npm publish --provenance --access public
